name: Release

# Publish a versioned release tarball whenever a vX.Y.Z tag is pushed.
# The recovery image build (buildroot-recovery-build) fetches this asset by
# version — see package/jrescue-app/jrescue-app.mk there.
#
# The git tag is the ONLY place the version lives: this workflow stamps it
# into core/config.py (APP_VERSION) while building the tarball. In a git
# checkout APP_VERSION stays "dev".
#
# Tags may live on any branch: normal releases are tagged on master; hotfix
# releases for an older line are tagged on a branch cut from the old tag
# (e.g. `git checkout -b hotfix/1.3.x v1.3.4`). Hotfix releases are built
# the same way but are NOT marked "Latest" and do not touch master's README.
#
# To cut a release:
#   1. commit everything, then: git tag vX.Y.Z && git push origin <branch> vX.Y.Z
#   2. bump JRESCUE_APP_VERSION in the buildroot recipe to X.Y.Z

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history — needed to check tag ancestry vs master

      - name: Check whether the tag is on master
        id: ancestry
        run: |
          git fetch origin master
          if git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/master; then
            echo "on_master=true" >> "$GITHUB_OUTPUT"
          else
            echo "on_master=false" >> "$GITHUB_OUTPUT"
          fi
          cat "$GITHUB_OUTPUT"

      - name: Build release tarball (version stamped from the tag)
        run: |
          v="${GITHUB_REF_NAME#v}"
          pkg="jrescue-app-$v"
          mkdir -p "dist/$pkg"
          # Ship only the runtime components buildroot installs.
          cp -a core console-application oled-grid-application web-application "dist/$pkg/"
          # Stamp the release version into the shipped config (repo keeps "dev").
          sed -i "s/^APP_VERSION = .*/APP_VERSION = \"$v\"/" "dist/$pkg/core/config.py"
          grep -n '^APP_VERSION' "dist/$pkg/core/config.py"
          find "dist/$pkg" -name '__pycache__' -type d -prune -exec rm -rf {} +
          tar -C dist -czf "$pkg.tar.gz" "$pkg"
          sha256sum "$pkg.tar.gz"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Hotfix releases from old lines must not steal the "Latest" badge.
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --latest=${{ steps.ancestry.outputs.on_master }} \
            jrescue-app-*.tar.gz

      - name: Update current version in README (commit to master)
        if: steps.ancestry.outputs.on_master == 'true'
        run: |
          git checkout -B master origin/master
          sed -i -E "s|^\*\*Current version:\*\* v.*|**Current version:** ${GITHUB_REF_NAME}|" README.md
          if git diff --quiet README.md; then
            echo "README already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "README: current version ${GITHUB_REF_NAME}" README.md
          git push origin master
